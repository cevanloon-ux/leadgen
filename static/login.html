<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITdaily. Lead Platform - Login</title>
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon.png">
<link rel="icon" type="image/png" sizes="192x192" href="/static/favicon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
<style>
:root{
  --bg:#ffffff;--bg-surface:#f4fcfc;--bg-input:#ffffff;
  --text:#404040;--text-heading:#000000;--text-muted:#9a9a9a;--text-label:#6b7280;
  --border:#dde1e6;--accent:#004EFF;--accent-hover:#003BC7;--accent-soft:rgba(0,78,255,.08);
  --error:#e53e3e;--logo-it:#000000;--logo-daily:#00D2D2;
  --toggle-bg:#f4fcfc;--toggle-hover:#00d2d2;
  --shadow:0 1px 3px rgba(0,0,0,.06);
}
[data-theme="dark"]{
  --bg:#111111;--bg-surface:#191919;--bg-input:#1a1a1a;
  --text:#d4d4d4;--text-heading:#f0f0f0;--text-muted:#707070;--text-label:#888888;
  --border:#2a2a2a;--accent:#004EFF;--accent-hover:#1a6aff;--accent-soft:rgba(0,78,255,.12);
  --error:#FF4444;--logo-it:#f0f0f0;--logo-daily:#00D2D2;
  --toggle-bg:#2a2a2a;--toggle-hover:#00d2d2;
  --shadow:0 1px 3px rgba(0,0,0,.3);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);color:var(--text);
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  transition:background .3s,color .3s;
}
.login-wrap{width:100%;max-width:400px;padding:24px}
.header{text-align:center;margin-bottom:40px}
.logo-svg{width:160px;height:auto;display:inline-block}
.logo-svg .it-letter{fill:var(--logo-it);transition:fill .3s}
.logo-svg .daily-letter{fill:var(--logo-daily)}
.header p{color:var(--text-muted);font-size:14px;margin-top:8px}
.card{
  background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;
  padding:32px 28px;box-shadow:var(--shadow);
}
.card h2{font-size:18px;color:var(--text-heading);margin-bottom:24px;text-align:center;font-weight:600}
.form-group{margin-bottom:20px}
.form-group label{display:block;margin-bottom:6px;font-size:13px;font-weight:700;color:var(--text-label);text-transform:uppercase;letter-spacing:.5px}
.form-group input{
  width:100%;padding:12px 16px;background:var(--bg-input);border:1px solid var(--border);
  border-radius:6px;color:var(--text);font-size:15px;font-family:inherit;
  transition:border-color .2s,box-shadow .2s;box-shadow:var(--shadow);
}
.form-group input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.form-group input::placeholder{color:var(--text-muted)}
.btn-login{
  width:100%;padding:14px;border:none;border-radius:6px;
  background:var(--accent);color:#fff;font-size:15px;font-weight:700;
  cursor:pointer;transition:background .2s;font-family:inherit;margin-top:8px;
}
.btn-login:hover{background:var(--accent-hover)}
.btn-login:disabled{opacity:.5;cursor:not-allowed}
.error-msg{
  background:rgba(229,62,62,.1);border:1px solid var(--error);border-radius:6px;
  padding:10px 14px;color:var(--error);font-size:13px;margin-bottom:16px;display:none;text-align:center;
}
.error-msg.show{display:block}
.theme-toggle{
  position:fixed;top:20px;right:20px;
  height:36px;padding:0 14px 0 10px;border-radius:18px;
  background:var(--toggle-bg);border:1px solid var(--border);
  display:flex;align-items:center;gap:6px;cursor:pointer;transition:all .25s;
  font-size:15px;line-height:1;color:var(--text);
}
.theme-toggle:hover{background:var(--toggle-hover);border-color:var(--toggle-hover);color:#fff}
.theme-toggle .t-icon{font-size:16px;flex-shrink:0}
.theme-toggle .t-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
@media(max-width:480px){
  .login-wrap{padding:16px}
  .card{padding:24px 20px}
}
</style>
</head>
<body>

<button class="theme-toggle" id="themeToggle" type="button" title="Toggle theme">
  <span class="t-icon" id="themeIcon">&#9788;</span>
  <span class="t-label" id="themeLabel">Light</span>
</button>

<div class="login-wrap">
  <div class="header">
    <svg class="logo-svg" viewBox="0 0 133 36" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ITdaily.">
      <polygon class="it-letter" points="12.6,4.7 12.6,0 0,0 0,4.7 3.6,4.7 3.6,24.1 0,24.1 0,28.8 12.6,28.8 12.6,24.1 9.1,24.1 9.1,4.7"/>
      <path class="it-letter" d="M16.3,4.7V0H36v4.7h-7.1v24.1h-5.5V4.7H16.3z"/>
      <path class="daily-letter" d="M37.9,18c0-1.6,0.2-3,0.5-4.4S39.3,11,40,10s1.6-1.8,2.7-2.4c1-0.6,2.3-0.9,3.7-0.9s2.7,0.3,3.7,0.9c1.1,0.6,1.9,1.4,2.6,2.5V0H58v28.8h-5.3v-2.9c-0.7,1.1-1.5,1.9-2.5,2.5s-2.2,0.9-3.7,0.9c-1.4,0-2.7-0.3-3.8-0.9S40.7,27,40,26s-1.3-2.2-1.6-3.6C38.1,21.1,37.9,19.6,37.9,18z M43.4,21.1c0,1.2,0.4,2.2,1.2,3s1.9,1.2,3.3,1.2c1.7,0,2.9-0.5,3.7-1.5s1.2-2.4,1.2-4.1v-3.2c0-1.7-0.4-3.1-1.2-4.1s-2-1.5-3.7-1.5c-1.4,0-2.5,0.4-3.3,1.2s-1.2,1.8-1.2,3C43.4,15.1,43.4,21.1,43.4,21.1z"/>
      <path class="daily-letter" d="M62.1,22.7c0-1.7,0.6-3.3,1.8-4.5c1.2-1.3,3-2,5.3-2.2l6-0.5V14c0-1.1-0.3-1.9-0.9-2.5c-0.6-0.5-1.4-0.8-2.5-0.8s-2,0.3-2.6,0.8c-0.7,0.5-1,1.3-1,2.3h-5.3c0-1.2,0.3-2.2,0.8-3.1s1.1-1.6,1.9-2.2s1.8-1,2.9-1.4c1.1-0.3,2.3-0.5,3.6-0.5c2.6,0,4.6,0.6,6.1,1.9s2.3,3.1,2.3,5.5v10.6H84v4.1h-8.3v-3.3h-0.2c-0.6,1.2-1.4,2.1-2.5,2.8c-1,0.7-2.4,1-4,1c-1,0-1.9-0.2-2.7-0.5s-1.5-0.8-2.2-1.4c-0.6-0.6-1.1-1.3-1.4-2.1C62.3,24.6,62.1,23.7,62.1,22.7z M67.6,23.3c0,0.6,0.3,1.1,0.9,1.5c0.6,0.3,1.4,0.5,2.3,0.5c1.4,0,2.4-0.5,3.2-1.4c0.8-1,1.2-2.1,1.2-3.5v-0.8L68.8,20c-0.8,0.1-1.2,0.6-1.2,1.4V23.3z"/>
      <path class="daily-letter" d="M86.6,4.7V0H92v4.7H86.6z M86.7,28.8V7.2H92v21.6H86.7z"/>
      <polygon class="daily-letter" points="102,24.7 102,0 96.7,0 96.7,28.8 105.6,28.8 105.6,24.7"/>
      <path class="daily-letter" d="M105.9,7.2h5.7l4.7,15.4h0.2l4.8-15.4h5.6L116.5,36h-9.2v-4.1h5.4l1.1-3.1L105.9,7.2z"/>
      <path class="daily-letter" d="M126.9,28.8v-6.1h6.1v6.1H126.9z"/>
    </svg>
    <p>Lead Generation Platform</p>
  </div>

  <div class="card">
    <h2>Sign in</h2>
    <div class="error-msg" id="errorMsg"></div>
    <form id="loginForm" novalidate>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter your username" autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="btnLogin">Sign in</button>
    </form>
  </div>
</div>

<script>
/* Theme */
const TM={
  mq:window.matchMedia('(prefers-color-scheme: dark)'),
  eff(){const s=localStorage.getItem('leadgen-theme');return(s==='dark'||s==='light')?s:this.mq.matches?'dark':'light'},
  apply(t){
    t==='dark'?document.documentElement.setAttribute('data-theme','dark'):document.documentElement.removeAttribute('data-theme');
    const i=document.getElementById('themeIcon'),l=document.getElementById('themeLabel');
    if(i)i.innerHTML=t==='dark'?'&#9790;':'&#9788;';if(l)l.textContent=t==='dark'?'Dark':'Light';
  },
  toggle(){const n=this.eff()==='dark'?'light':'dark';localStorage.setItem('leadgen-theme',n);this.apply(n)},
  init(){this.apply(this.eff());this.mq.addEventListener('change',()=>{if(!localStorage.getItem('leadgen-theme'))this.apply(this.eff())});
    document.getElementById('themeToggle').addEventListener('click',()=>this.toggle())}
};
TM.apply(TM.eff());

document.addEventListener('DOMContentLoaded',()=>{
  TM.init();

  // Check if already logged in
  fetch('/api/auth/me').then(r=>{if(r.ok)window.location.href='/'}).catch(()=>{});

  document.getElementById('loginForm').addEventListener('submit', async(e)=>{
    e.preventDefault();
    const err=document.getElementById('errorMsg');
    const btn=document.getElementById('btnLogin');
    err.classList.remove('show');
    btn.disabled=true;btn.textContent='Signing in...';

    try{
      const r=await fetch('/api/auth/login',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          username:document.getElementById('username').value.trim(),
          password:document.getElementById('password').value
        })
      });
      const d=await r.json();
      if(!r.ok)throw new Error(d.detail||'Login failed');
      window.location.href='/';
    }catch(ex){
      err.textContent=ex.message;err.classList.add('show');
      btn.disabled=false;btn.textContent='Sign in';
    }
  });

  // Enter key support
  document.getElementById('password').addEventListener('keydown',e=>{
    if(e.key==='Enter')document.getElementById('loginForm').dispatchEvent(new Event('submit'));
  });
});
</script>
</body>
</html>
